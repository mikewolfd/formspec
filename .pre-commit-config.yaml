repos:
  - repo: local
    hooks:
      - id: spec-artifacts-check
        name: check schema-driven spec artifacts and contracts
        entry: npm run docs:check
        language: system
        pass_filenames: false
        files: ^(schemas/.*\.json|specs/.*\.md|scripts/generate-spec-artifacts\.mjs|scripts/run-spec-contract-tests\.mjs|scripts/spec-artifacts\.config\.json|tests/conformance/spec/test_cross_spec_contracts\.py|package\.json|package-lock\.json)$
      - id: html-docs-check
        name: check HTML docs freshness
        entry: ./scripts/check-html-docs.sh
        language: system
        pass_filenames: false
        files: ^(specs/.*\.md|docs/template\.html)$
      - id: build-and-test
        name: build and test
        entry: bash -c 'make build && make test'
        language: system
        pass_filenames: false
        always_run: true
