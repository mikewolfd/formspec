<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formspec — Reference Examples</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary:      #005ea2;
      --color-primary-dark: #1a4480;
      --color-primary-light:#d9e8f6;
      --color-success:      #00a91c;
      --color-warning:      #ffbe2e;
      --color-error:        #e52207;
      --color-neutral-50:   #f9f9f9;
      --color-neutral-100:  #f0f0f0;
      --color-neutral-200:  #dfe1e2;
      --color-neutral-700:  #565c65;
      --color-text:         #1b1b1b;
      --font:               -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius:             4px;
    }

    /* ── Base form elements ── */
    input, textarea, select {
      display: block;
      width: 100%;
      padding: 0.5rem 0.625rem;
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 1rem;
      color: var(--color-text);
      background: #fff;
      line-height: 1.5;
    }
    input:focus, textarea:focus, select:focus {
      outline: 2px solid var(--color-primary);
      outline-offset: 0;
      border-color: var(--color-primary);
    }
    input[type="radio"], input[type="checkbox"] {
      display: inline-block;
      width: auto;
      padding: 0;
      border: none;
      accent-color: var(--color-primary);
    }
    button {
      font-family: var(--font);
      font-size: 1rem;
      cursor: pointer;
    }

    body {
      font-family: var(--font);
      font-size: 16px;
      color: var(--color-text);
      background: var(--color-neutral-50);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .site-header {
      background: var(--color-primary);
      color: #fff;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .site-header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .header-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.6);
      padding: 3px 8px;
      border-radius: 2px;
    }
    .header-links {
      margin-left: auto;
      display: flex;
      gap: 16px;
    }
    .header-links a {
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
    }
    .header-links a:hover { color: #fff; text-decoration: underline; }

    /* ── Layout ── */
    .app-body {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 0;
      flex: 1;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      padding: 24px;
      align-items: start;
    }

    /* ── Example sidebar ── */
    .example-nav {
      position: sticky;
      top: 24px;
      background: #fff;
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius);
      padding: 16px;
    }
    .example-nav h3 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-neutral-700);
      margin-bottom: 12px;
    }
    .example-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .example-list li {
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.1s;
    }
    .example-list li:hover {
      background: #edf5ff;
    }
    .example-list li.active {
      background: var(--color-primary-light);
      color: var(--color-primary-dark);
      font-weight: 600;
    }
    .example-list li .example-name {
      font-size: 14px;
      font-weight: 600;
      display: block;
    }
    .example-list li .example-desc {
      font-size: 12px;
      color: var(--color-neutral-700);
      margin-top: 2px;
      display: block;
    }
    .example-list li.active .example-desc {
      color: var(--color-primary-dark);
      opacity: 0.8;
    }

    /* ── Main content ── */
    .main-area {
      margin-left: 24px;
      min-height: 400px;
    }

    .form-container {
      background: #fff;
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius);
      padding: 32px;
    }
    .form-container formspec-render { display: block; }

    /* ── Example info bar ── */
    .example-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius);
    }
    .example-info h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-primary-dark);
    }
    .example-info .info-version {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      background: var(--color-primary-light);
      color: var(--color-primary-dark);
    }
    .example-info .info-desc {
      font-size: 13px;
      color: var(--color-neutral-700);
      margin-left: auto;
    }

    /* ── Loading / empty state ── */
    .state-message {
      text-align: center;
      padding: 80px 20px;
      color: var(--color-neutral-700);
    }
    .state-message h2 {
      font-size: 20px;
      color: var(--color-primary-dark);
      margin-bottom: 8px;
    }
    .state-message p {
      font-size: 14px;
      max-width: 40ch;
      margin: 0 auto;
    }

    /* ── Server response panel ── */
    .server-response {
      margin-top: 24px;
      display: none;
    }
    .server-response.visible { display: block; }
    .server-response h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--color-neutral-700);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
	    .server-response pre {
	      background: #f6f8fa;
	      border: 1px solid var(--color-neutral-200);
	      border-radius: var(--radius);
	      padding: 16px;
	      font-size: 12px;
	      overflow-x: auto;
	      white-space: pre-wrap;
	    }

	    /* ── Client submit panel ── */
	    .client-response {
	      margin-top: 10px;
	    }
	    .client-response h3 {
	      font-size: 14px;
	      font-weight: 700;
	      margin-bottom: 8px;
	      color: var(--color-neutral-700);
	      text-transform: uppercase;
	      letter-spacing: 0.05em;
	    }
	    .client-meta {
	      font-size: 12px;
	      color: var(--color-neutral-700);
	      margin: 6px 0 10px;
	    }
	    .client-empty,
	    .server-empty {
	      font-size: 13px;
	      color: var(--color-neutral-700);
	      margin: 0 0 10px;
	    }
	    .client-details summary {
	      cursor: pointer;
	      font-weight: 700;
	      color: var(--color-primary-dark);
	      margin: 8px 0;
	    }
	    .client-response pre {
	      background: #f6f8fa;
	      border: 1px solid var(--color-neutral-200);
	      border-radius: var(--radius);
	      padding: 16px;
	      font-size: 12px;
	      overflow-x: auto;
	      white-space: pre-wrap;
	    }

	    /* ── Form actions ── */
	    .form-actions {
	      display: flex;
	      gap: 10px;
	      align-items: center;
	      margin-bottom: 14px;
	    }
	    .action-btn {
	      border-radius: var(--radius);
	      border: 1px solid var(--color-neutral-200);
	      background: #fff;
	      color: var(--color-primary-dark);
	      padding: 8px 12px;
	      font-weight: 700;
	      cursor: pointer;
	      font-family: var(--font);
	    }
	    .action-btn:hover { border-color: var(--color-primary); background: var(--color-primary-light); }
	    .action-btn.secondary { color: var(--color-neutral-700); }

	    /* ── Example tabs ── */
	    .example-tabs {
	      display: flex;
	      gap: 6px;
	      align-items: center;
	      border-bottom: 1px solid var(--color-neutral-200);
	      padding-bottom: 8px;
	      margin-bottom: 14px;
	    }
	    .example-tab {
	      border-radius: 999px;
	      border: 1px solid var(--color-neutral-200);
	      background: #fff;
	      color: var(--color-neutral-700);
	      padding: 7px 12px;
	      font-weight: 800;
	      cursor: pointer;
	      font-family: var(--font);
	      letter-spacing: 0.01em;
	    }
	    .example-tab:hover { border-color: var(--color-primary); background: var(--color-primary-light); color: var(--color-primary-dark); }
	    .example-tab.active,
	    .example-tab[aria-selected="true"] {
	      border-color: var(--color-primary);
	      background: var(--color-primary);
	      color: #fff;
	    }
	    .example-tabpanel { display: none; }
	    .example-tabpanel.active { display: block; }

	    /* ── Wizard step indicators — hidden (let form handle navigation) ── */
	    .formspec-wizard-steps { display: none !important; }

    /* ── Wizard nav buttons ── */
    .formspec-wizard-next {
      background: var(--color-primary);
      color: #fff;
      border: none;
      padding: 10px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius);
    }
    .formspec-wizard-next:hover { background: var(--color-primary-dark); }
    .formspec-wizard-prev {
      background: transparent;
      color: var(--color-primary);
      border: 2px solid var(--color-primary);
      padding: 8px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius);
    }
    .formspec-wizard-prev:hover { background: var(--color-primary-light); }
    .formspec-wizard-prev:disabled,
    .formspec-wizard-next:disabled { opacity: 0.4; cursor: default; }

    /* ── Page heading / description spacing ── */
    .formspec-page h2 {
      margin-bottom: 0.25rem;
      border-bottom: 2px solid var(--color-primary-light);
      padding-bottom: 0.5rem;
    }
    .formspec-page-description {
      margin-bottom: 0.5rem;
      color: var(--color-neutral-700);
    }

    /* ── Label styling ── */
    .formspec-label { font-weight: 600; font-size: 0.95rem; }
    .formspec-heading { color: var(--color-text); }
    h3.formspec-heading { font-size: 1.1rem; color: var(--color-primary-dark); }
    .formspec-hint { color: var(--color-neutral-700); }

    /* ── Screener ── */
    .formspec-screener-continue {
      background: var(--color-primary);
      color: #fff;
      border: none;
      padding: 10px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius);
      margin-top: 0.5rem;
    }
    .formspec-screener-continue:hover { background: var(--color-primary-dark); }
    .formspec-screener {
      max-width: 860px;
      margin: 0 auto;
      border: 1px solid var(--color-neutral-200);
      border-radius: 10px;
      background: linear-gradient(180deg, #f8fbff 0%, #ffffff 40%);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .formspec-screener-heading { margin: 0; font-size: 1.5rem; color: var(--color-primary-dark); line-height: 1.2; }
    .formspec-screener-intro { margin: 0; color: var(--color-neutral-700); max-width: 65ch; line-height: 1.45; }
    .formspec-screener-fields { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 4px; }
    .formspec-screener-field { background: #fff; border: 1px solid var(--color-neutral-200); border-radius: 8px; padding: 12px; }

    /* ── Collapsible sections ── */
    .formspec-collapsible { border-color: var(--color-neutral-200); }
    .formspec-collapsible summary::after { color: var(--color-primary); }
    .formspec-collapsible-content { border-top-color: var(--color-neutral-200); }

    /* ── Cards / Panels ── */
    .formspec-card, .formspec-panel { border-color: var(--color-neutral-200); }
    .formspec-card-title { border-bottom-color: var(--color-neutral-200); }
    .formspec-panel-header { border-bottom-color: var(--color-neutral-200); }

    /* ── Popover / Modal ── */
    .formspec-popover-trigger { border-color: var(--color-neutral-200); color: var(--color-primary); }
    .formspec-popover-trigger:hover { background: var(--color-primary-light); border-color: var(--color-primary); }
    .formspec-modal-trigger { border-color: var(--color-primary); color: var(--color-primary); }
    .formspec-modal-trigger:hover { background: var(--color-primary-light); }

    /* ── Summary terms ── */
    .formspec-summary dt { color: var(--color-neutral-700); }

    /* ── Validation ── */
    .formspec-error:not(:empty) {
      color: var(--color-error);
      background: #fff5f5;
      border-left: 4px solid var(--color-error);
      border-radius: 4px;
      padding: 6px 8px;
      margin-top: 4px;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .formspec-field input[aria-invalid="true"],
    .formspec-field select[aria-invalid="true"],
    .formspec-field textarea[aria-invalid="true"] {
      border-color: var(--color-error) !important;
      box-shadow: 0 0 0 1px var(--color-error);
    }
    .formspec-shape-error { border-left-color: var(--color-error); color: var(--color-error); }
    .formspec-shape-warning { border-left-color: var(--color-warning); color: #7a4f00; }

    /* ── Submit button ── */
    .formspec-submit {
      background: var(--color-primary);
      color: #fff;
      border: 2px solid var(--color-primary);
      padding: 10px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: var(--font);
    }
    .formspec-submit:hover { background: var(--color-primary-dark); }
    .formspec-submit:disabled { opacity: 0.5; cursor: default; }

    /* ── Badges ── */
    .formspec-badge--warning { background: #fef3c7; color: #92400e; }
    .formspec-badge--error { background: #fee2e2; color: #991b1b; }
    .formspec-badge--primary { background: var(--color-primary-light); color: var(--color-primary-dark); }
    .formspec-badge--success { background: #dcfce7; color: #166534; }

    /* ── File drop zone ── */
    .formspec-drop-zone { border-color: var(--color-neutral-200); color: var(--color-neutral-700); }
    .formspec-drop-zone--active { border-color: var(--color-primary); }

    /* ── Signature canvas ── */
    .formspec-signature-canvas { border-color: var(--color-neutral-200); }

    /* ── Accordion ── */
    .formspec-accordion-item { border-color: var(--color-neutral-200); }
    .formspec-accordion-item summary { background: var(--color-neutral-100); }
    .formspec-accordion-content { border-top-color: var(--color-neutral-200); }

    /* ── Tabs ── */
    .formspec-tab { color: var(--color-neutral-700); }
    .formspec-tab--active { color: var(--color-primary); border-bottom-color: var(--color-primary); }

    /* ── Rating stars ── */
    .formspec-rating-star { color: #d1d5db; }
    .formspec-rating-star--selected { color: #e74c3c; }
    .formspec-rating-star:hover { color: #f5a623; }

    /* ── Responsive columns ── */
    @media (max-width: 575px) {
      .formspec-grid, .formspec-columns { grid-template-columns: 1fr !important; }
    }

    /* ── Mobile layout ── */
    @media (max-width: 768px) {
      .site-header { padding: 10px 16px; }
      .site-header h1 { font-size: 15px; }
      .app-body { grid-template-columns: 1fr; padding: 12px 16px; gap: 12px; }
      .example-nav { position: static; }
      .main-area { margin-left: 0; }
      .form-container { padding: 16px; }
      .formspec-screener { padding: 16px; }
      .formspec-screener-fields { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <span class="header-badge">Formspec</span>
  <h1>Reference Examples</h1>
  <div class="header-links">
    <a href="tools.html">Developer Tools</a>
  </div>
</header>

<div class="app-body">
  <!-- Example sidebar -->
  <nav class="example-nav" aria-label="Example forms">
    <h3>Examples</h3>
    <ul class="example-list" id="example-list"></ul>
  </nav>

  <!-- Main form content -->
  <main class="main-area" id="main-area">
    <div class="state-message" id="empty-state">
      <h2>Select an Example</h2>
      <p>Choose a form from the sidebar to render it.</p>
    </div>
  </main>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
