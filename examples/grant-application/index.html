<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Federal Grant Application — Formspec Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base form element styles (replaces USWDS) ── */
    input, textarea, select {
      display: block;
      width: 100%;
      padding: 0.5rem 0.625rem;
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 1rem;
      color: var(--color-text);
      background: #fff;
      line-height: 1.5;
    }
    input:focus, textarea:focus, select:focus {
      outline: 2px solid var(--color-primary);
      outline-offset: 0;
      border-color: var(--color-primary);
    }
    input[type="radio"], input[type="checkbox"] {
      display: inline-block;
      width: auto;
      padding: 0;
      border: none;
      accent-color: var(--color-primary);
    }
    button {
      font-family: var(--font);
      font-size: 1rem;
      cursor: pointer;
    }

    /* ── Screener continue button ── */
    .formspec-screener-continue {
      background: var(--color-primary);
      color: #fff;
      border: none;
      padding: 10px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius);
      margin-top: 0.5rem;
    }
    .formspec-screener-continue:hover { background: var(--color-primary-dark); }
    .formspec-screener {
      max-width: 860px;
      margin: 0 auto;
      border: 1px solid var(--color-neutral-200);
      border-radius: 10px;
      background: linear-gradient(180deg, #f8fbff 0%, #ffffff 40%);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .formspec-screener-heading {
      margin: 0;
      font-size: 1.5rem;
      color: var(--color-primary-dark);
      line-height: 1.2;
    }
    .formspec-screener-intro {
      margin: 0;
      color: var(--color-neutral-700);
      max-width: 65ch;
      line-height: 1.45;
    }
    .formspec-screener-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 4px;
    }
    .formspec-screener-field {
      background: #fff;
      border: 1px solid var(--color-neutral-200);
      border-radius: 8px;
      padding: 12px;
    }
    .formspec-screener .formspec-screener-continue {
      margin-top: 8px;
      align-self: flex-start;
    }

    /* ── Wizard step indicators — hidden (sidebar nav is the primary indicator) ── */
    .formspec-wizard-steps {
      display: none !important;
    }

    /* ── Wizard nav buttons ── */
    .formspec-wizard-next {
      background: var(--color-primary);
      color: #fff;
      border: none;
      padding: 10px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius);
    }
    .formspec-wizard-next:hover { background: var(--color-primary-dark); }
    .formspec-wizard-prev {
      background: transparent;
      color: var(--color-primary);
      border: 2px solid var(--color-primary);
      padding: 8px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius);
    }
    .formspec-wizard-prev:hover { background: var(--color-primary-light); }
    .formspec-wizard-prev:disabled,
    .formspec-wizard-next:disabled { opacity: 0.4; cursor: default; }

    /* ── Page heading / description spacing ── */
    .formspec-page h2 {
      margin-bottom: 0.25rem;
      border-bottom: 2px solid var(--color-primary-light);
      padding-bottom: 0.5rem;
    }
    .formspec-page-description {
      margin-bottom: 0.5rem;
      color: var(--color-neutral-700);
    }

    /* ── Label styling ── */
    .formspec-label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    /* ── Headings within form ── */
    .formspec-heading {
      color: var(--color-text);
    }
    h3.formspec-heading {
      font-size: 1.1rem;
      color: var(--color-primary-dark);
    }

    /* ── Popover triggers — lay them out in a row when siblings ── */
    .formspec-popover + .formspec-popover {
      margin-top: 0;
    }

    /* ── Hint text ── */
    .formspec-hint { color: var(--color-neutral-700); }

    :root {
      --color-primary:      #005ea2;
      --color-primary-dark: #1a4480;
      --color-primary-light:#d9e8f6;
      --color-success:      #00a91c;
      --color-warning:      #ffbe2e;
      --color-error:        #e52207;
      --color-neutral-50:   #f9f9f9;
      --color-neutral-100:  #f0f0f0;
      --color-neutral-200:  #dfe1e2;
      --color-neutral-700:  #565c65;
      --color-text:         #1b1b1b;
      --font:               -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius:             4px;
    }

    body {
      font-family: var(--font);
      font-size: 16px;
      color: var(--color-text);
      background: var(--color-neutral-50);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 72px; /* clearance for fixed totals bar */
    }

    /* ── Header ── */
    .site-header {
      background: var(--color-primary);
      color: #fff;
      padding: 12px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .site-header .gov-logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.6);
      padding: 3px 8px;
      border-radius: 2px;
    }
    .site-header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    /* ── Layout ── */
    .app-body {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 0;
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 32px 40px;
      align-items: start;
    }

    /* ── Sidebar progress nav ── */
    .progress-nav {
      position: sticky;
      top: 24px;
      background: #fff;
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius);
      padding: 16px;
    }
    .progress-nav h3 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-neutral-700);
      margin-bottom: 12px;
    }
    .progress-nav ol {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .progress-nav li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      padding: 6px 8px;
      border-radius: var(--radius);
      color: var(--color-neutral-700);
    }
      .progress-nav li.active {
      background: var(--color-primary-light);
      color: var(--color-primary-dark);
      font-weight: 600;
    }
    .progress-nav li.progress-step {
      cursor: pointer;
    }
    .progress-nav li.progress-step:hover {
      background: #edf5ff;
      color: var(--color-primary-dark);
    }
    .progress-nav li .step-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
    }
    .progress-nav li.valid .step-icon::after { content: "✓"; }
    .progress-nav li.invalid .step-icon { border-color: var(--color-error); color: var(--color-error); }
    .progress-nav li.invalid .step-icon::after { content: "!"; }

    /* ── Main form area ── */
    .form-area {
      background: #fff;
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius);
      padding: 32px;
      margin-left: 24px;
    }

    /* ── Mobile layout ── */
    @media (max-width: 768px) {
      body { padding-bottom: 100px; }

      .site-header { padding: 10px 16px; }
      .site-header h1 { font-size: 15px; }

      .app-body {
        grid-template-columns: 1fr;
        padding: 12px 16px;
        gap: 12px;
      }

      /* Collapse sidebar into a horizontal stepper strip */
      .progress-nav {
        position: static;
        padding: 8px 12px;
      }
      .progress-nav h3 { display: none; }
      .progress-nav ol {
        flex-direction: row;
        gap: 0;
        overflow-x: auto;
        padding-bottom: 2px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .progress-nav ol::-webkit-scrollbar { display: none; }
      .progress-nav li {
        flex-direction: column;
        gap: 3px;
        font-size: 10px;
        padding: 4px 6px;
        white-space: nowrap;
        flex-shrink: 0;
        text-align: center;
        min-width: 64px;
      }
      .progress-nav li .step-icon {
        width: 18px;
        height: 18px;
        margin: 0 auto;
      }

      .form-area {
        margin-left: 0;
        padding: 16px;
      }
      .formspec-screener {
        padding: 16px;
        border-radius: 8px;
      }
      .formspec-screener-fields {
        grid-template-columns: 1fr;
      }

      .totals-bar {
        gap: 12px;
        padding: 10px 16px;
        font-size: 13px;
      }
      .totals-bar .totals-amount { font-size: 14px; }
      .totals-bar .totals-match { margin-left: auto; font-size: 12px; }
    }

    /* Stack all multi-column layouts below the sm breakpoint (576px) */
    @media (max-width: 575px) {
      .formspec-grid,
      .formspec-columns {
        grid-template-columns: 1fr !important;
      }
    }

    formspec-render {
      display: block;
    }

    /* ── Collapsible review sections ── */
    .formspec-collapsible {
      border-color: var(--color-neutral-200);
    }
    .formspec-collapsible summary::after {
      color: var(--color-primary);
    }
    .formspec-collapsible-content {
      border-top-color: var(--color-neutral-200);
    }

    /* ── File drop zone ── */
    .formspec-drop-zone {
      border-color: var(--color-neutral-200);
      color: var(--color-neutral-700);
    }
    .formspec-drop-zone--active {
      border-color: var(--color-primary);
    }

    /* ── Popover / Modal triggers use themed colors ── */
    .formspec-popover-trigger {
      border-color: var(--color-neutral-200);
      color: var(--color-primary);
    }
    .formspec-popover-trigger:hover {
      background: var(--color-primary-light);
      border-color: var(--color-primary);
    }
    .formspec-modal-trigger {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }
    .formspec-modal-trigger:hover {
      background: var(--color-primary-light);
    }

    /* ── Card / Panel use themed border ── */
    .formspec-card,
    .formspec-panel {
      border-color: var(--color-neutral-200);
    }
    .formspec-card-title {
      border-bottom-color: var(--color-neutral-200);
    }
    .formspec-panel-header {
      border-bottom-color: var(--color-neutral-200);
    }

    /* ── Summary terms use themed muted color ── */
    .formspec-summary dt {
      color: var(--color-neutral-700);
    }

    /* ── Signature canvas ── */
    .formspec-signature-canvas {
      border-color: var(--color-neutral-200);
    }

    /* ── Accordion items ── */
    .formspec-accordion-item {
      border-color: var(--color-neutral-200);
    }
    .formspec-accordion-item summary {
      background: var(--color-neutral-100);
    }
    .formspec-accordion-content {
      border-top-color: var(--color-neutral-200);
    }

    /* ── Tabs ── */
    .formspec-tab {
      color: var(--color-neutral-700);
    }
    .formspec-tab--active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
    }

    /* ── Badge themed variants ── */
    .formspec-badge--warning { background: #fef3c7; color: #92400e; }
    .formspec-badge--error { background: #fee2e2; color: #991b1b; }
    .formspec-badge--primary { background: var(--color-primary-light); color: var(--color-primary-dark); }
    .formspec-badge--success { background: #dcfce7; color: #166534; }

    /* ── Rating stars ── */
    .formspec-rating-star { color: #d1d5db; }
    .formspec-rating-star--selected { color: #e74c3c; }
    .formspec-rating-star:hover { color: #f5a623; }

    /* ── Validation summary overrides (themed colors) ── */
    .formspec-shape-error {
      border-left-color: var(--color-error);
      color: var(--color-error);
    }
    .formspec-shape-warning {
      border-left-color: var(--color-warning);
      color: #7a4f00;
    }

    /* ── Inline field validation styling ── */
    .formspec-error:not(:empty) {
      color: var(--color-error);
      background: #fff5f5;
      border-left: 4px solid var(--color-error);
      border-radius: 4px;
      padding: 6px 8px;
      margin-top: 4px;
      font-size: 13px;
      line-height: 1.35;
    }
    .formspec-field input[aria-invalid="true"],
    .formspec-field select[aria-invalid="true"],
    .formspec-field textarea[aria-invalid="true"] {
      border-color: var(--color-error) !important;
      box-shadow: 0 0 0 1px var(--color-error);
      background: #fffafa;
    }
    .formspec-field input[aria-invalid="true"]:focus,
    .formspec-field select[aria-invalid="true"]:focus,
    .formspec-field textarea[aria-invalid="true"]:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(214, 28, 24, 0.24);
    }

    /* ── Submit button ── */
    .formspec-submit {
      background: var(--color-primary);
      color: #fff;
      border: 2px solid var(--color-primary);
      padding: 10px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: var(--font);
    }
    .formspec-submit:hover { background: var(--color-primary-dark); }
    .formspec-submit:focus { outline: none; box-shadow: 0 0 0 3px #2491ff; }
    @media (forced-colors: active) { .formspec-submit:focus { outline: 3px solid Highlight; } }
    .formspec-submit:disabled { opacity: 0.5; cursor: default; }
    .btn-back-screener {
      background: transparent;
      color: var(--color-primary);
      border: 2px solid var(--color-primary);
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: var(--font);
      display: none;
    }
    .btn-back-screener:hover { background: var(--color-primary-light); }

    /* ── Sticky footer totals bar ── */
    .totals-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--color-primary-dark);
      color: #fff;
      padding: 12px 40px;
      display: flex;
      align-items: center;
      gap: 40px;
      font-size: 14px;
      z-index: 100;
      pointer-events: none; /* don't block clicks on content beneath */
    }
    .totals-bar .totals-label { color: rgba(255,255,255,0.75); margin-right: 8px; }
    .totals-bar .totals-amount { font-weight: 700; font-size: 16px; }
    .totals-bar .totals-match { margin-left: auto; font-size: 13px; }
    .totals-bar .totals-match.ok { color: #9ef0a3; }
    .totals-bar .totals-match.mismatch { color: #ff8c7c; }

    /* ── Server response panel ── */
    .server-response {
      margin-top: 24px;
      display: none;
    }
    .server-response.visible { display: block; }
    .server-response h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--color-neutral-700);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .server-response pre {
      background: #f6f8fa;
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius);
      padding: 16px;
      font-size: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<header class="site-header">
  <span class="gov-logo">U.S. Gov</span>
  <h1>Federal Grant Application Portal</h1>
  <a href="tools.html" style="color:rgba(255,255,255,0.9);font-size:14px;font-weight:500;text-decoration:none;margin-left:auto">Developer Tools</a>
</header>

<div class="app-body">
  <!-- Progress sidebar -->
  <nav class="progress-nav" aria-label="Form progress">
    <h3>Progress</h3>
    <ol id="progress-steps">
      <li data-step="screener" class="progress-step">
        <span class="step-icon"></span>
        Eligibility
      </li>
      <li data-page="Applicant Info">
        <span class="step-icon"></span>
        Applicant Info
      </li>
      <li data-page="Project Narrative">
        <span class="step-icon"></span>
        Project Narrative
      </li>
      <li data-page="Budget">
        <span class="step-icon"></span>
        Budget
      </li>
      <li data-page="Project Phases">
        <span class="step-icon"></span>
        Project Phases
      </li>
      <li data-page="Subcontractors">
        <span class="step-icon"></span>
        Subcontractors
      </li>
      <li data-page="Review &amp; Submit">
        <span class="step-icon"></span>
        Review &amp; Submit
      </li>
    </ol>
  </nav>

  <!-- Main form content -->
  <main class="form-area">
    <formspec-render id="form"></formspec-render>

    <div class="back-screener-area">
      <button class="btn-back-screener" id="btn-back-screener" type="button">Back to Screening</button>
    </div>

    <!-- Server response -->
    <div class="server-response" id="server-response" aria-live="polite">
      <h3>Server Response</h3>
      <pre id="server-response-pre"></pre>
    </div>
  </main>
</div>

<!-- Sticky totals footer -->
<footer class="totals-bar" aria-live="polite" aria-label="Budget totals">
  <span>
    <span class="totals-label">Grand Total</span>
    <span class="totals-amount" id="footer-grand-total">—</span>
  </span>
  <span>
    <span class="totals-label">Requested</span>
    <span class="totals-amount" id="footer-requested">—</span>
  </span>
  <span class="totals-match" id="footer-match"></span>
</footer>

<script type="module" src="./main.js"></script>
</body>
</html>
