<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formspec Portal Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .formspec-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .form-field { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #374151; }
        input, select, textarea { 
            width: 100%; 
            padding: 0.5rem; 
            border: 1px solid #d1d5db; 
            border-radius: 0.375rem; 
            box-shadow: inset 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }
        input:focus { outline: 2px solid #3b82f6; border-color: transparent; }
        .error-message { color: #dc2626; font-size: 0.875rem; margin-top: 0.25rem; }
        .required-indicator { color: #dc2626; }
        .group { border-left: 4px solid #3b82f6; padding-left: 1rem; margin-bottom: 2rem; }
        .repeat-instance { border: 1px dashed #cbd5e1; padding: 1rem; margin-bottom: 1rem; position: relative; }
        .btn-primary { background: #2563eb; color: white; padding: 0.5rem 1rem; border-radius: 0.375rem; font-weight: 500; }
        .btn-secondary { background: #f1f5f9; color: #475569; padding: 0.5rem 1rem; border-radius: 0.375rem; font-weight: 500; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200 px-4 py-2.5">
        <div class="flex justify-between items-center max-w-screen-xl mx-auto">
            <span class="text-xl font-bold text-blue-600">Formspec Portal</span>
            <div class="flex gap-4">
                <button onclick="loadSample('grant')" class="text-sm font-medium text-gray-600 hover:text-blue-600">Grant Application</button>
                <button onclick="loadSample('expense')" class="text-sm font-medium text-gray-600 hover:text-blue-600">Expense Report</button>
            </div>
        </div>
    </nav>

    <main class="max-w-screen-xl mx-auto py-8 px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Sidebar / Status -->
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-bold mb-4">Form Health</h2>
                <div id="validation-summary" class="space-y-2 text-sm text-gray-600">
                    <p>Load a form to see status...</p>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-bold mb-4">Live Response (JSON)</h2>
                <pre id="json-output" class="bg-gray-900 text-blue-400 p-4 rounded text-xs overflow-auto max-h-96">{}</pre>
            </div>
        </div>

        <!-- Main Form Area -->
        <div class="lg:col-span-2">
            <formspec-render id="form-host"></formspec-render>
        </div>
    </main>

    <script type="module">
        import { FormEngine } from '../packages/formspec-engine/src/index.ts';
        import { effect } from '@preact/signals-core';

        const samples = {
            grant: {
                "$formspec": "1.0",
                "url": "https://portal.gov/grant-v1",
                "version": "1.0.0",
                "title": "Community Grant Application",
                "items": [
                    { "key": "org_name", "type": "field", "dataType": "string", "label": "Organization Name", "required": true },
                    { "key": "request_amount", "type": "field", "dataType": "money", "label": "Requested Amount", "required": true },
                    { "key": "budget_match", "type": "field", "dataType": "money", "label": "Matched Funding", "calculate": "request_amount * 0.2" },
                    {
                        "key": "milestones",
                        "type": "group",
                        "label": "Project Milestones",
                        "repeatable": true,
                        "minRepeat": 1,
                        "children": [
                            { "key": "task", "type": "field", "dataType": "string", "label": "Task Name", "required": true },
                            { "key": "cost", "type": "field", "dataType": "money", "label": "Estimated Cost", "initialValue": 0 }
                        ]
                    }
                ],
                "shapes": [
                    {
                        "id": "budget_check",
                        "target": "#",
                        "severity": "error",
                        "message": "Total milestone costs ({{sum(milestones[*].cost)}}) must not exceed requested amount ({{request_amount}})",
                        "constraint": "sum(milestones[*].cost) <= request_amount"
                    }
                ]
            },
            expense: {
                "$formspec": "1.0",
                "url": "https://portal.gov/expense-v1",
                "version": "1.0.0",
                "title": "Corporate Expense Claim",
                "items": [
                    { "key": "employee", "type": "field", "dataType": "string", "label": "Employee Name", "required": true },
                    { "key": "trip_purpose", "type": "field", "dataType": "string", "label": "Purpose of Trip" },
                    {
                        "key": "expenses",
                        "type": "group",
                        "label": "Expense Items",
                        "repeatable": true,
                        "minRepeat": 1,
                        "children": [
                            { "key": "category", "type": "field", "dataType": "choice", "label": "Category", "options": [
                                { "value": "travel", "label": "Travel" },
                                { "value": "meals", "label": "Meals" },
                                { "value": "lodging", "label": "Lodging" }
                            ]},
                            { "key": "amount", "type": "field", "dataType": "money", "label": "Amount", "required": true },
                            { "key": "audit_required", "type": "field", "dataType": "boolean", "label": "Requires Audit?", "calculate": "amount > 500", "readonly": true }
                        ]
                    }
                ]
            }
        };

        class FormspecPortalRenderer extends HTMLElement {
            constructor() {
                super();
                this.cleanup = [];
            }

            set definition(def) {
                this.innerHTML = '';
                this.cleanup.forEach(fn => fn());
                this.cleanup = [];
                
                const engine = new FormEngine(def);
                window.engine = engine;

                const container = document.createElement('div');
                container.className = 'formspec-container';
                
                const title = document.createElement('h1');
                title.className = 'text-2xl font-bold mb-6 text-gray-800';
                title.textContent = def.title;
                container.appendChild(title);

                const renderItem = (item, parent, prefix = '') => {
                    const fullName = prefix ? `${prefix}.${item.key}` : item.key;
                    
                    if (item.type === 'group') {
                        const groupDiv = document.createElement('div');
                        groupDiv.className = 'group';
                        const h3 = document.createElement('h3');
                        h3.className = 'text-lg font-semibold mb-4';
                        h3.textContent = item.label;
                        groupDiv.appendChild(h3);
                        
                        const itemsContainer = document.createElement('div');
                        groupDiv.appendChild(itemsContainer);

                        if (item.repeatable) {
                            this.cleanup.push(effect(() => {
                                const count = engine.repeats[fullName].value;
                                itemsContainer.innerHTML = '';
                                for (let i = 0; i < count; i++) {
                                    const instanceDiv = document.createElement('div');
                                    instanceDiv.className = 'repeat-instance';
                                    const label = document.createElement('div');
                                    label.className = 'text-xs font-bold text-gray-400 mb-2 uppercase';
                                    label.textContent = `Item #${i + 1}`;
                                    instanceDiv.appendChild(label);
                                    
                                    item.children.forEach(child => renderItem(child, instanceDiv, `${fullName}[${i}]`));
                                    itemsContainer.appendChild(instanceDiv);
                                }
                            }));
                            
                            const addBtn = document.createElement('button');
                            addBtn.type = 'button';
                            addBtn.className = 'btn-secondary text-sm mt-2';
                            addBtn.textContent = '+ Add Item';
                            addBtn.onclick = () => engine.addRepeatInstance(fullName);
                            groupDiv.appendChild(addBtn);
                        } else {
                            item.children.forEach(child => renderItem(child, itemsContainer, fullName));
                        }
                        parent.appendChild(groupDiv);
                    } else if (item.type === 'field') {
                        const fieldDiv = document.createElement('div');
                        fieldDiv.className = 'form-field';
                        
                        const label = document.createElement('label');
                        fieldDiv.appendChild(label);

                        const input = item.dataType === 'choice' ? document.createElement('select') : document.createElement('input');
                        input.name = fullName;
                        if (item.dataType === 'money' || item.dataType === 'decimal') input.type = 'number';
                        if (item.dataType === 'boolean') input.type = 'checkbox';
                        
                        if (item.dataType === 'choice' && item.options) {
                            item.options.forEach(opt => {
                                const o = document.createElement('option');
                                o.value = opt.value;
                                o.textContent = opt.label;
                                input.appendChild(o);
                            });
                        }

                        fieldDiv.appendChild(input);

                        const errDiv = document.createElement('div');
                        errDiv.className = 'error-message';
                        fieldDiv.appendChild(errDiv);

                        this.cleanup.push(effect(() => {
                            const val = engine.signals[fullName].value;
                            if (input.type === 'checkbox') input.checked = !!val;
                            else input.value = val ?? '';
                            
                            const isReadonly = engine.readonlySignals[fullName]?.value;
                            input.disabled = isReadonly;
                            if (isReadonly) input.classList.add('bg-gray-100');
                            
                            const isReq = engine.requiredSignals[fullName]?.value;
                            label.innerHTML = `${item.label} ${isReq ? '<span class="required-indicator">*</span>' : ''}`;
                            
                            const err = engine.errorSignals[fullName]?.value;
                            errDiv.textContent = err || '';
                            input.classList.toggle('border-red-500', !!err);
                        }));

                        input.oninput = (e) => {
                            let val = e.target.type === 'checkbox' ? e.target.checked : e.target.value;
                            engine.setValue(fullName, val);
                        };

                        parent.appendChild(fieldDiv);
                    }
                };

                def.items.forEach(item => renderItem(item, container));
                
                const submitBtn = document.createElement('button');
                submitBtn.className = 'btn-primary w-full py-3 mt-8';
                submitBtn.textContent = 'Submit Application';
                submitBtn.onclick = () => {
                    const resp = engine.getResponse();
                    alert(resp.validationReport.valid ? "Form submitted successfully!" : "Please correct errors before submitting.");
                };
                container.appendChild(submitBtn);

                this.appendChild(container);

                this.cleanup.push(effect(() => {
                    const report = engine.getValidationReport();
                    const summary = document.getElementById('validation-summary');
                    summary.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span>Status:</span>
                            <span class="${report.valid ? 'text-green-600' : 'text-red-600'} font-bold">
                                ${report.valid ? '● Valid' : '● Invalid'}
                            </span>
                        </div>
                        <div class="pt-2 border-t mt-2">
                            ${report.results.length} total finding(s)
                        </div>
                        <ul class="list-disc pl-4 pt-2">
                            ${report.results.map(r => `<li class="${r.severity === 'error' ? 'text-red-500' : 'text-orange-500'}">${r.message}</li>`).join('')}
                        </ul>
                    `;

                    const jsonOutput = document.getElementById('json-output');
                    jsonOutput.textContent = JSON.stringify(engine.getResponse(), null, 2);
                }));
            }
        }

        customElements.define('formspec-render', FormspecPortalRenderer);

        window.loadSample = (key) => {
            document.getElementById('form-host').definition = samples[key];
        };

        loadSample('grant');
    </script>
</body>
</html>
