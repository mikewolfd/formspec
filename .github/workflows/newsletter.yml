name: Newsletter Draft

on:
  push:
    branches: [main]
    paths:
      - "site/src/content/blog/*.md"

jobs:
  draft:
    if: github.repository == 'Formspec-org/formspec'
    name: Create newsletter draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Detect new blog posts
        id: detect
        run: |
          ADDED=$(git diff --name-only --diff-filter=A HEAD~1 -- 'site/src/content/blog/*.md')
          if [ -z "$ADDED" ]; then
            echo "No new blog posts found"
            echo "has_posts=false" >> "$GITHUB_OUTPUT"
          else
            echo "New posts found:"
            echo "$ADDED"
            echo "has_posts=true" >> "$GITHUB_OUTPUT"
            echo "$ADDED" > /tmp/new-posts.txt
          fi

      - name: Install email dependencies
        if: steps.detect.outputs.has_posts == 'true'
        working-directory: emails
        run: npm install

      - name: Create drafts
        if: steps.detect.outputs.has_posts == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
        run: |
          while IFS= read -r post; do
            echo "Creating newsletter draft for: $post"
            cd emails && npx tsx send-draft.mts "../$post"
            cd ..
          done < /tmp/new-posts.txt
