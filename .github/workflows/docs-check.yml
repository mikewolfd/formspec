name: Docs And Contracts

on:
  pull_request:
    paths:
      - "schemas/**"
      - "specs/**"
      - "scripts/generate-spec-artifacts.mjs"
      - "scripts/spec-artifacts.config.json"
      - "tests/conformance/spec/test_cross_spec_contracts.py"
      - "scripts/run-spec-contract-tests.mjs"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
    paths:
      - "schemas/**"
      - "specs/**"
      - "scripts/generate-spec-artifacts.mjs"
      - "scripts/spec-artifacts.config.json"
      - "tests/conformance/spec/test_cross_spec_contracts.py"
      - "scripts/run-spec-contract-tests.mjs"
      - "package.json"
      - "package-lock.json"

jobs:
  docs-check:
    if: github.repository == 'Formspec-org/formspec'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - run: npm install -g npm@10

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python package and test runner
        run: |
          python -m pip install --upgrade pip maturin pytest "jsonschema[format]" referencing msgspec
          pip install -e ".[test]"
          pip install --no-build-isolation ./crates/formspec-py

      - name: Install Node dependencies
        run: npm install

      - name: Run schema/spec gate checks
        run: npm run docs:check
