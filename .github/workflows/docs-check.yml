name: Docs And Contracts

on:
  pull_request:
    paths:
      - "schemas/**"
      - "specs/**"
      - "scripts/generate-spec-artifacts.mjs"
      - "scripts/spec-artifacts.config.json"
      - "tests/unit/schema/contracts/test_cross_spec_contracts.py"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
    paths:
      - "schemas/**"
      - "specs/**"
      - "scripts/generate-spec-artifacts.mjs"
      - "scripts/spec-artifacts.config.json"
      - "tests/unit/schema/contracts/test_cross_spec_contracts.py"
      - "package.json"
      - "package-lock.json"

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python test runner
        run: python -m pip install --upgrade pip pytest "jsonschema[format]" referencing msgspec

      - name: Install Node dependencies
        run: npm ci

      - name: Run schema/spec gate checks
        run: npm run docs:check
