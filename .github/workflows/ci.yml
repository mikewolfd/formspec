name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[test]"
      - run: npm ci
      - run: npm run build
      - run: npm run test:unit

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install maturin
      - run: pip install -e ".[test]"
      - run: pip install --no-build-isolation ./crates/formspec-py
      - run: pytest --ignore=tests/e2e

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[test]" fastapi "uvicorn[standard]" pydantic
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  studio-e2e-tests:
    name: Studio E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[test]"
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:studio:e2e
