name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack and wasm-opt
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          sudo apt-get install -y binaryen
      - run: pip install maturin
      - run: pip install -e ".[test]"
      - run: pip install --no-build-isolation ./crates/formspec-py
      - run: npm ci
      - name: Build all packages
        id: build
        run: npm run build 2>&1 | tee /tmp/build-output.txt
      - name: Run unit tests
        id: tests
        if: steps.build.outcome == 'success'
        run: npm run test:unit 2>&1 | tee /tmp/test-output.txt
        env:
          FORCE_COLOR: 0
      - name: Comment failure on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let buildOut = '', testOut = '';
            try { buildOut = fs.readFileSync('/tmp/build-output.txt', 'utf8'); } catch {}
            try { testOut = fs.readFileSync('/tmp/test-output.txt', 'utf8'); } catch {}
            const buildLines = buildOut.split('\n').slice(-100).join('\n');
            const testLines = testOut.split('\n').slice(-150).join('\n');
            let body = '## Unit Tests (TS) CI Failure\n\n';
            if ('${{ steps.build.outcome }}' === 'failure') {
              body += '<details><summary>Build output (last 100 lines)</summary>\n\n```\n' + buildLines + '\n```\n\n</details>\n\n';
            }
            if (testOut) {
              body += '<details><summary>Test output (last 150 lines)</summary>\n\n```\n' + testLines + '\n```\n\n</details>';
            }
            if (!buildOut && !testOut) {
              body += 'No output captured — failure may be in an earlier step.';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install maturin
      - run: pip install -e ".[test]"
      - run: pip install --no-build-isolation ./crates/formspec-py
      - run: pytest --ignore=tests/e2e

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack and wasm-opt
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          sudo apt-get install -y binaryen
      - run: pip install maturin
      - run: pip install -e ".[test]" fastapi "uvicorn[standard]" pydantic
      - run: pip install --no-build-isolation ./crates/formspec-py
      - run: npm ci
      - name: Build all packages
        id: build
        run: npm run build 2>&1 | tee /tmp/build-output.txt
      - run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        if: steps.build.outcome == 'success'
        run: npm run test:e2e 2>&1 | tee /tmp/e2e-output.txt
      - name: Comment E2E failure on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let buildOut = '', testOut = '';
            try { buildOut = fs.readFileSync('/tmp/build-output.txt', 'utf8'); } catch {}
            try { testOut = fs.readFileSync('/tmp/e2e-output.txt', 'utf8'); } catch {}
            const buildLines = buildOut.split('\n').slice(-100).join('\n');
            const testLines = testOut.split('\n').slice(-150).join('\n');
            let body = '## E2E Tests Failure\n\n';
            if ('${{ steps.build.outcome }}' === 'failure') {
              body += '<details><summary>Build output (last 100 lines)</summary>\n\n```\n' + buildLines + '\n```\n\n</details>\n\n';
            }
            if (testOut) {
              body += '<details><summary>Test output (last 150 lines)</summary>\n\n```\n' + testLines + '\n```\n\n</details>';
            }
            if (!buildOut && !testOut) body += 'No output captured.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  studio-e2e-tests:
    name: Studio E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack and wasm-opt
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          sudo apt-get install -y binaryen
      - run: pip install maturin
      - run: pip install -e ".[test]"
      - run: pip install --no-build-isolation ./crates/formspec-py
      - run: npm ci
      - name: Build all packages
        id: build
        run: npm run build 2>&1 | tee /tmp/build-output.txt
      - run: npx playwright install --with-deps chromium
      - name: Run Studio E2E tests
        if: steps.build.outcome == 'success'
        run: npm run test:studio:e2e 2>&1 | tee /tmp/studio-e2e-output.txt
      - name: Comment Studio E2E failure on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let buildOut = '', testOut = '';
            try { buildOut = fs.readFileSync('/tmp/build-output.txt', 'utf8'); } catch {}
            try { testOut = fs.readFileSync('/tmp/studio-e2e-output.txt', 'utf8'); } catch {}
            const buildLines = buildOut.split('\n').slice(-100).join('\n');
            const testLines = testOut.split('\n').slice(-150).join('\n');
            let body = '## Studio E2E Tests Failure\n\n';
            if ('${{ steps.build.outcome }}' === 'failure') {
              body += '<details><summary>Build output (last 100 lines)</summary>\n\n```\n' + buildLines + '\n```\n\n</details>\n\n';
            }
            if (testOut) {
              body += '<details><summary>Test output (last 150 lines)</summary>\n\n```\n' + testLines + '\n```\n\n</details>';
            }
            if (!buildOut && !testOut) body += 'No output captured.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
