name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Build site
        run: bash scripts/build-hosting.sh

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FORMSPEC_SITE }}
          channelId: live
          projectId: formspec-site
